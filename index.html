<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sugarlump-School-Demo</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=0-0000000000"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', '0-0000000000');
    </script>

    <style>
        @font-face {
            font-family: 'Chalet LondonNineteenEighty Regular';
            src: url('fonts/Chalet LondonNineteenEighty Regular.otf') format('opentype');
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: Google Sans, Noto, Roboto, Helvetica Neue, sans-serif;
            color: #244376;
            background-color: #ffff99;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            padding: 0 15px;
        }

        .card {
            background-color: #ffff99;
            padding: 10px;
            margin-bottom: 1em;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .logo {
            width: 350px;
            max-width: 90%;
            height: auto;
            display: block;
            margin: auto;
        }

        .viewer-container {
            width: 100%;
            height: 400px;
            position: relative;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
        }

        #myVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
        }

        #myModelViewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #myModelViewer button[slot="ar-button"] {
            display: none;
        }

        .button-container {
            margin: 30px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .action-button {
            background-color: #ffffff;
            border-radius: 8px;
            border: 2px solid #59cbe8;
            height: 60px;
            min-width: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-button:hover {
            background-color: #f0f8ff;
            border-color: #48b0cc;
        }

        .action-button-text {
            font-size: 32px;
            color: #000099;
            font-family: 'Chalet LondonNineteenEighty Regular', sans-serif;
            white-space: nowrap;
            font-weight: bold;
        }

        .link-list h2 {
            font-family: 'Chalet LondonNineteenEighty Regular', sans-serif;
            color: #ff69b4;
            font-size: 20px;
            margin: 10px 0;
        }

        .link-list a {
            color: #59cbe8;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-link {
            font-family: 'Chalet LondonNineteenEighty Regular';
            color: #59cbe8;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="images/sugarlump_experience_AR_assets-01.png" alt="Sugarlump Logo" class="logo">
        </div>

        <div class="card">
            <div class="viewer-container">
                <video id="myVideo" loop muted playsinline poster="images/Video Poster_3.png">
                    <source src="Video/sugarlump_school_video_v3.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                
                <model-viewer 
                    id="myModelViewer" 
                    src="Models/entire_family_99cm.glb" 
                    ios-src="Models/GIRL_converted.usdz" 
                    ar ar-modes="quick-look webxr scene-viewer" 
                    style="display: none;">
                </model-viewer>
            </div>

            <p style="font-family: 'Chalet LondonNineteenEighty Regular'; font-weight: bold; color: #000099; margin-top: 15px;">
                Make Sure Sound is On!
            </p>

            <div class="button-container">
                <div class="action-button" id="play-pause-button">
                    <img id="play-pause-icon" src="images/play_icon.png" style="height: 40px; margin-right: 10px;" alt="Play">
                    <span class="action-button-text">Play</span>
                </div>
                
                </div>

            <div class="link-list">
                <img src="images/erin_video_scenes-34.png" style="width: 300px; max-width: 90%; margin-bottom: 10px;">
                <h2>why: <a href="https://sugarlump.love/" target="_blank">the kindness project</a></h2>
                <h2>rewards: <a href="https://sugarlump.love/join-the-fun" target="_blank">local elementary schools</a></h2>
                <h2>FAQ: <a href="https://sugarlump.love/faq" target="_blank">about sugarlump</a></h2>
                <h2>no cost: <a href="https://sugarlump.love/contact" target="_blank">join sugarlump kindness club</a></h2>
            </div>

            <div class="footer-link">
                <a href="https://avertek.net/" target="_blank">Contact AVERtek to learn more about AR marketing.</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('myVideo');
            const modelViewer = document.getElementById('myModelViewer');
            const playPauseButton = document.getElementById('play-pause-button');
            const playPauseIcon = document.getElementById('play-pause-icon');
            const arButton = document.getElementById('ar-button');
            const btnText = playPauseButton.querySelector('.action-button-text');

            const arSound = new Audio('Sound/sweet_neighbor_of_mine3.mp3');
            arSound.loop = true;
            let isPlaying = false;

            // Audio Unlock
            const initAudio = () => {
                arSound.play().then(() => {
                    arSound.pause();
                    arSound.currentTime = 0;
                }).catch(e => console.log("Interaction required for audio"));
                window.removeEventListener('touchstart', initAudio);
                window.removeEventListener('click', initAudio);
            };
            window.addEventListener('touchstart', initAudio);
            window.addEventListener('click', initAudio);

            function togglePlayPause() {
                if (isPlaying) {
                    video.pause();
                    arSound.pause();
                    video.muted = true;
                    playPauseIcon.src = 'images/play_icon.png';
                    btnText.textContent = 'Play';
                } else {
                    video.muted = false;
                    video.play();
                    arSound.play();
                    playPauseIcon.src = 'images/pause_icon.png';
                    btnText.textContent = 'Pause';
                }
                isPlaying = !isPlaying;
            }

            if (playPauseButton) {
                playPauseButton.addEventListener('click', togglePlayPause);
            }

            // AR Activation Logic
            if (arButton && modelViewer) {
                arButton.addEventListener('click', () => {
                    video.pause();
                    video.muted = true;
                    isPlaying = false;
                    playPauseIcon.src = 'images/play_icon.png';
                    btnText.textContent = 'Play';

                    if (modelViewer.canActivateAR) {
                        modelViewer.activateAR();
                    } else {
                        alert("AR is supported only on mobile devices.");
                    }
                });
            }

            // Sync audio with AR session
            if (modelViewer) {
                modelViewer.addEventListener('ar-status', (event) => {
                    if (event.detail.status === 'presenting') {
                        arSound.play();
                    } else {
                        arSound.pause();
                    }
                });
            }
        });
    </script>
</body>
</html>
